<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8">
    <title>Floppy Disk Recovery</title>
    <style>
        body {
            background: black;
            color: #00ff88;
            font-family: monospace;
            text-align: center;
            padding: 40px;
        }
        button {
            background: #111;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }
        input {
            background: #111;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 8px;
            margin: 5px;
        }
        #output { margin-top: 20px; }
        #leaderboard { margin-top: 40px; }
    </style>
</head>
<body>

<h1>Disk Recovery Interface</h1>

<div id="status">
    Tap your NFC tag to open this page. Each tap recovers a fragment.
</div>

<div id="output"></div>

<div id="decodeSection" style="display:none;">
    <h3>Enter Final Flag</h3>
    <input id="playerName" placeholder="Your Name">
    <input id="flagInput" placeholder="Decoded Flag">
    <button onclick="submitFlag()">Submit</button>
</div>

<div id="leaderboard"></div>

<script src="leaderboard.js"></script>
<script src="game.js"></script>

</body>
</html>
